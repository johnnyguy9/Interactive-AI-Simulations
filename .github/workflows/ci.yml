name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install requirements
        run: |
          if [ -f requirements.txt ]; then
            # Panda3D needs system OpenGL libs at import time on some setups;
            # skip if it fails so this doesn't gate the lint job.
            pip install -r requirements.txt || echo "requirements install failed; continuing"
          fi
      - name: Byte-compile sources
        run: python -m compileall -q .
